<!DOCTYPE html>
<html>
<head>
<title>TravelEase - Premium Bus Booking</title>
<style>
body{margin:0;font-family:"Segoe UI",sans-serif;background:#0b1220;color:white;}

.filter-bar{display:flex;justify-content:center;gap:20px;padding:15px;background:#111827;position:sticky;top:0;z-index:10;}
.filter-bar span{background:#1f2937;padding:8px 15px;border-radius:20px;color:#38bdf8;font-weight:600;}

.bus-card{width:85%;margin:15px auto;background:#111827;border-radius:14px;padding:18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 5px 20px rgba(0,0,0,0.4);transition:0.3s;}
.bus-card:hover{transform:scale(1.02);}
.bus-info h2{margin:0;color:#fff;font-size:20px;}
.bus-info p{margin:4px 0;color:#9ca3af;}

.bus-right{text-align:center;background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:15px;border-radius:12px;min-width:120px;}
.bus-right h2{margin:0;}

button{margin-top:8px;padding:8px 12px;border:none;border-radius:8px;cursor:pointer;background:#fff;color:#111827;font-weight:bold;}

.container{display:flex;width:90%;margin:20px auto;background:#111827;border-radius:12px;overflow:hidden;}
.left-panel{width:25%;padding:15px;background:#0f172a;}
.seat-area{width:35%;padding:15px;}
.right-panel{width:40%;padding:15px;background:#0f172a;}

.bus-layout{display:inline-block;}
.bus-row{display:flex;align-items:center;margin-bottom:6px;}
.aisle{width:22px;flex-shrink:0;}
.seat{width:36px;height:36px;display:flex;align-items:center;justify-content:center;margin:3px;border-radius:6px 6px 10px 10px;cursor:pointer;font-size:11px;font-weight:600;border-bottom:3px solid rgba(0,0,0,0.25);transition:transform 0.1s;}
.seat:active{transform:scale(0.92);}
.available{background:#22c55e;color:#fff;}
.booked{background:#374151;color:#6b7280;cursor:not-allowed;}
.selected{background:#f59e0b;color:#111;}
.seat-legend{display:flex;gap:14px;margin-bottom:10px;font-size:12px;align-items:center;}
.legend-dot{width:14px;height:14px;border-radius:3px;display:inline-block;margin-right:4px;}
.driver-box{background:#1e40af;color:#fff;font-size:10px;font-weight:700;padding:0;border-radius:6px;display:flex;align-items:center;justify-content:center;width:80px;height:36px;margin:3px;}
.row-label{font-size:10px;color:#6b7280;width:18px;text-align:center;margin-right:2px;}

input,select{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none;background:#1f2937;color:white;}
.passenger-box{background:#111827;padding:10px;border-radius:10px;margin-top:10px;}
#otpSection{display:none;}

/* ── SPIN MODAL ── */
#spinOverlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.82);
  z-index:999;
  align-items:center;
  justify-content:center;
}
#spinOverlay.active{display:flex;}

#spinModal{
  background:#111827;
  border-radius:20px;
  padding:28px 32px;
  text-align:center;
  width:360px;
  box-shadow:0 0 40px rgba(99,102,241,0.35);
  border:1px solid #1f2937;
  position:relative;
}

#spinModal h2{
  margin:0 0 4px;
  font-size:22px;
  color:#a78bfa;
}
#spinModal p{color:#9ca3af;font-size:13px;margin:0 0 18px;}

.spin-meta{display:flex;justify-content:center;gap:20px;margin-bottom:14px;font-size:13px;color:#9ca3af;}
.spin-meta b{color:#fff;}

.wheel-wrap{position:relative;width:230px;height:230px;margin:0 auto 16px;}
#spinCanvas{border-radius:50%;}
.wheel-pointer{
  position:absolute;
  top:-14px;left:50%;
  transform:translateX(-50%);
  font-size:28px;line-height:1;
  filter:drop-shadow(0 2px 4px rgba(0,0,0,0.6));
}

#spinResultBox{
  padding:10px 18px;
  border-radius:10px;
  font-size:14px;font-weight:600;
  background:#1f2937;color:#9ca3af;
  margin-bottom:14px;
  min-height:40px;
  display:flex;align-items:center;justify-content:center;
}
#spinResultBox.win{background:#052e16;color:#4ade80;}

#paySpinArea{display:none;margin-bottom:10px;}
#paySpinArea p{font-size:13px;color:#9ca3af;margin:0 0 8px;}
.pay-chips{display:flex;justify-content:center;gap:8px;}
.pay-chip{padding:5px 14px;border:1px solid #374151;border-radius:20px;cursor:pointer;font-size:12px;color:#9ca3af;background:transparent;}
.pay-chip.active{background:#6366f1;color:#fff;border-color:#6366f1;}

#btnSpin{
  padding:10px 28px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;border:none;border-radius:10px;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:opacity 0.2s;
}
#btnSpin:disabled{opacity:0.4;cursor:not-allowed;}

#btnSkipSpin{
  display:block;margin:10px auto 0;
  background:transparent;color:#6b7280;
  border:none;font-size:13px;cursor:pointer;
  text-decoration:underline;
}

.disc-pill{
  display:inline-block;
  padding:3px 10px;
  background:#052e16;color:#4ade80;
  border-radius:20px;font-size:12px;font-weight:600;
  margin-left:8px;
}
</style>
</head>
<body>

<div class="filter-bar">
  <span id="fromShow"></span>
  <span id="toShow"></span>
  <span id="dateShow"></span>
</div>

<div id="busCard"></div>

<div id="bookingSection" style="display:none;" class="container">
  <div class="left-panel">
    <h3>Seat Selection</h3>
  </div>
  <div class="seat-area" id="seats"></div>
  <div class="right-panel">
    <h3>Passenger Details</h3>
    <input id="mobile" placeholder="Mobile">
    <input id="email" placeholder="Email">
    <div id="passengerSection"></div>
    <div id="otpSection">
      <h3>OTP</h3>
      <input id="otpInput" placeholder="Enter OTP">
      <button onclick="verifyOtp()">Verify OTP</button>
    </div>
    <button onclick="sendOtp()">Proceed</button>
  </div>
</div>

<!-- ══ SPIN WHEEL MODAL ══ -->
<div id="spinOverlay">
  <div id="spinModal">
    <h2>Spin & Win!</h2>
    <p>2 free spins — then ₹50/spin. Good luck! 🤞</p>

    <div class="spin-meta">
      <span>Free spins: <b id="smFree">2</b></span>
      <span>Paid spins: <b id="smPaid">0</b></span>
    </div>

    <div class="wheel-wrap">
      <div class="wheel-pointer">▼</div>
      <canvas id="spinCanvas" width="230" height="230"></canvas>
    </div>

    <div id="spinResultBox">Spin to unlock your discount!</div>

    <div id="paySpinArea">
      <p>Pay ₹50 to spin again</p>
      <div class="pay-chips">
        <div class="pay-chip active">UPI</div>
        <div class="pay-chip">Card</div>
        <div class="pay-chip">Wallet</div>
      </div>
      <button onclick="payAndSpin()" style="margin-top:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;padding:9px 24px;font-weight:700;cursor:pointer;font-size:14px;">Pay ₹50 & Spin</button>
    </div>

    <button id="btnSpin" onclick="doSpin()">Spin Free!</button>
    <button id="btnSkipSpin" onclick="closeSpinModal()">Skip, book at full price</button>
  </div>
</div>

<script>
/* ── URL PARAMS ── */
const params = new URLSearchParams(window.location.search);
const from   = params.get("from")  || "Delhi";
const to     = params.get("to")    || "Dehradun";
const date   = params.get("date")  || "2026-04-25";

document.getElementById("fromShow").innerText = "From: " + from;
document.getElementById("toShow").innerText   = "To: "   + to;
document.getElementById("dateShow").innerText = "Date: " + date;

/* ── BUSES ── */
async function loadBuses() {
  const res  = await fetch(`/buses?from=${from}&to=${to}&date=${date}`);
  const data = await res.json();
  let html = "";
  data.forEach(bus => {
    html += `
    <div class="bus-card">
      <div class="bus-info">
        <h2>${bus.name}</h2>
        <p>${bus.from} → ${bus.to}</p>
        <p>${bus.departure} → ${bus.arrival}</p>
        <p>Available Seats: ${bus.availableSeats}</p>
      </div>
      <div class="bus-right">
        <h2 id="priceDisplay-${bus.id}">₹${bus.price}</h2>
        <button onclick="handleBooking(${bus.id},${bus.price})">Book</button>
        <button onclick="openChat(${bus.id},encodeURIComponent('${bus.name}'))" style="margin-top:6px;background:#22c55e;color:#111827;">💬 Chat</button>
      </div>
    </div>`;
  });
  document.getElementById("busCard").innerHTML = html;
}

/* ── BOOKING ── */
let currentBusId   = null;
let currentBasePrice = 0;
let appliedDisc    = 0;

function handleBooking(id, price) {
  if (!localStorage.getItem("token")) {
    // ✅ Smart redirect — send user back to buses page with same search params
    const q = new URLSearchParams({ redirect:"buses", from, to, date });
    window.location.href = "login.html?" + q.toString();
    return;
  }
  currentBusId    = id;
  currentBasePrice = price;
  appliedDisc     = 0;
  openSpinModal();
}

/* ── SEATS ── */
let selected = [];

async function openSeat(id) {
  currentBusId = id;
  selected     = [];
  document.getElementById("bookingSection").style.display = "flex";
  const res   = await fetch(`/seats/${id}`);
  const seats = await res.json();
  let box = document.getElementById("seats");
  box.innerHTML = "";

  // Legend
  const legend = document.createElement("div");
  legend.className = "seat-legend";
  legend.innerHTML = `
    <span><span class="legend-dot" style="background:#22c55e"></span>Available</span>
    <span><span class="legend-dot" style="background:#f59e0b"></span>Selected</span>
    <span><span class="legend-dot" style="background:#374151"></span>Booked</span>`;
  box.appendChild(legend);

  // Real bus layout: 2 seats | aisle | 2 seats per row
  const layout = document.createElement("div");
  layout.className = "bus-layout";

  const totalSeats = seats.length;
  const seatsPerRow = 4;
  const totalRows = Math.ceil(totalSeats / seatsPerRow);

  // Driver row
  const drvRow = document.createElement("div");
  drvRow.className = "bus-row";
  const drvLabel = document.createElement("div");
  drvLabel.className = "row-label";
  drvLabel.textContent = "";
  drvRow.appendChild(drvLabel);
  const drvBox = document.createElement("div");
  drvBox.className = "driver-box";
  drvBox.innerHTML = "🚌 Driver";
  drvRow.appendChild(drvBox);
  layout.appendChild(drvRow);

  for (let row = 0; row < totalRows; row++) {
    const rowDiv = document.createElement("div");
    rowDiv.className = "bus-row";

    const rowLabel = document.createElement("div");
    rowLabel.className = "row-label";
    rowLabel.textContent = String.fromCharCode(65 + row);
    rowDiv.appendChild(rowLabel);

    for (let col = 0; col < seatsPerRow; col++) {
      if (col === 2) {
        const aisle = document.createElement("div");
        aisle.className = "aisle";
        rowDiv.appendChild(aisle);
      }

      const seatNo = row * seatsPerRow + col + 1;
      if (seatNo > totalSeats) break;

      const s = seats[seatNo - 1];
      const d = document.createElement("div");
      d.className = "seat " + (s.booked ? "booked" : "available");
      d.innerText = s.no;
      d.title = "Seat " + s.no;

      if (!s.booked) {
        d.onclick = () => {
          if (d.classList.contains("selected")) {
            d.classList.remove("selected");
            d.classList.add("available");
            selected = selected.filter(x => x !== s.no);
          } else {
            d.classList.remove("available");
            d.classList.add("selected");
            selected.push(s.no);
          }
          updatePassengerUI();
        };
      }
      rowDiv.appendChild(d);
    }
    layout.appendChild(rowDiv);
  }

  box.appendChild(layout);
}

function updatePassengerUI() {
  let c = document.getElementById("passengerSection");
  if (selected.length === 0) { c.innerHTML = ""; return; }
  c.innerHTML = `
  <div class="passenger-box">
    <p>Seat No.: ${selected.join(", ")}</p>
    <input id="name" placeholder="Name">
    <input id="age" type="number" placeholder="Age">
    <select id="gender">
      <option>Male</option><option>Female</option>
    </select>
  </div>`;
}

/* ── OTP ── */
let userMobile = "";

async function sendOtp() {
  userMobile = document.getElementById("mobile").value;
  const email = document.getElementById("email").value;
  if (!userMobile) { alert("Please enter mobile number"); return; }
  if (!email || !email.includes("@")) { alert("Please enter a valid email address"); return; }
  await fetch("/send-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ mobile: userMobile })
  });
  document.getElementById("otpSection").style.display = "block";
  alert("OTP sent (check terminal)");
}

async function verifyOtp() {
  let otp = document.getElementById("otpInput").value;
  let res  = await fetch("/verify-otp", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ mobile: userMobile, otp })
  });
  let data = await res.json();
  if (!data.success) { alert("Wrong OTP"); return; }
  await fetch("/book", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": localStorage.getItem("token") },
    body: JSON.stringify({ busId: currentBusId, seats: selected })
  });
  let confirmRes = await fetch("/confirm", {
    method: "POST",
    headers: { "Content-Type": "application/json", "Authorization": localStorage.getItem("token") },
    body: JSON.stringify({
      busId: currentBusId, seats: selected,
      email: document.getElementById("email").value,
      passengers: [{ name: document.getElementById("name").value, age: document.getElementById("age").value, gender: document.getElementById("gender").value }]
    })
  });
  let data2 = await confirmRes.json();
  localStorage.setItem("bookingId_" + currentBusId, data2.bookingId);
  alert("Booking Confirmed: " + data2.bookingId);
  window.open(`/ticket/${data2.bookingId}`);
  location.reload();
}

/* ════════════════════════════════
   SPIN WHEEL LOGIC
════════════════════════════════ */
const SEGMENTS = [
  { label: "5% Off",    color: "#6366f1", disc: 5,  real: true  },
  { label: "70% Off",   color: "#dc2626", disc: 70, real: false },
  { label: "10% Off",   color: "#0891b2", disc: 10, real: true  },
  { label: "Try Again", color: "#374151", disc: 0,  real: true  },
  { label: "15% Off",   color: "#7c3aed", disc: 15, real: true  },
  { label: "50% Off",   color: "#be123c", disc: 50, real: false },
  { label: "Free Snack",color: "#b45309", disc: 0,  real: true, snack: true },
  { label: "5% Off",    color: "#0d9488", disc: 5,  real: true  },
];

let freeSpins  = 2;
let paidSpins  = 0;
let wheelAngle = 0;
let spinning   = false;

const canvas = document.getElementById("spinCanvas");
const ctx    = canvas.getContext("2d");
const N      = SEGMENTS.length;
const ARC    = (2 * Math.PI) / N;

function drawWheel(angle) {
  ctx.clearRect(0, 0, 230, 230);
  const cx = 115, cy = 115, r = 112;
  for (let i = 0; i < N; i++) {
    const start = angle + i * ARC;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + ARC);
    ctx.closePath();
    ctx.fillStyle = SEGMENTS[i].color;
    ctx.fill();
    ctx.strokeStyle = "#0b1220";
    ctx.lineWidth   = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + ARC / 2);
    ctx.textAlign  = "right";
    ctx.fillStyle  = "#fff";
    ctx.font       = "bold 12px 'Segoe UI', sans-serif";
    ctx.fillText(SEGMENTS[i].label, r - 8, 4);
    ctx.restore();
  }
  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, 2 * Math.PI);
  ctx.fillStyle = "#0b1220";
  ctx.fill();
  ctx.strokeStyle = "#6366f1";
  ctx.lineWidth   = 2;
  ctx.stroke();
}

function openSpinModal() {
  document.getElementById("spinOverlay").classList.add("active");
  drawWheel(wheelAngle);
  updateSpinUI();
}

function closeSpinModal() {
  document.getElementById("spinOverlay").classList.remove("active");
  openSeat(currentBusId);
}

function getRiggedIndex() {
  const realOnes = SEGMENTS.map((s, i) => s.real ? i : -1).filter(i => i !== -1);
  return realOnes[Math.floor(Math.random() * realOnes.length)];
}

function doSpin() {
  if (spinning) return;
  if (freeSpins <= 0) {
    alert("Please complete ₹50 payment to spin again!");
    return;
  }
  freeSpins--;

  spinning = true;
  document.getElementById("btnSpin").disabled = true;
  const rb = document.getElementById("spinResultBox");
  rb.className = "";
  rb.textContent = "Spinning...";

  const winIdx = getRiggedIndex();
  const fullTurns = 5 + Math.floor(Math.random() * 3);
  const targetAngle = -Math.PI / 2 - winIdx * ARC - ARC / 2;
  const target = targetAngle - fullTurns * 2 * Math.PI;
  const startAngle = wheelAngle;
  const duration   = 4200;
  const startTime  = performance.now();

  function animate(now) {
    const t    = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    const ang  = startAngle + (target - startAngle) * ease;
    drawWheel(ang);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      wheelAngle = targetAngle % (2 * Math.PI);
      spinning   = false;
      showSpinResult(winIdx);
      updateSpinUI();
    }
  }
  requestAnimationFrame(animate);
}

function showSpinResult(idx) {
  const seg     = SEGMENTS[idx];
  const rb      = document.getElementById("spinResultBox");
  const discPct = seg.disc;
  const saving  = Math.round(currentBasePrice * discPct / 100);
  const newPrice = currentBasePrice - saving;

  if (seg.snack) {
    appliedDisc    = 0;
    rb.className   = "win";
    rb.textContent = "Free snack on your journey!";
    const pd = document.getElementById("priceDisplay-" + currentBusId);
    if (pd) pd.innerHTML = "₹" + currentBasePrice + '<span class="disc-pill">+ Free Snack</span>';
  } else if (discPct > 0) {
    appliedDisc    = discPct;
    rb.className   = "win";
    rb.textContent = discPct + "% off! Pay ₹" + newPrice + " (saved ₹" + saving + " from ₹" + currentBasePrice + ")";
    const pd = document.getElementById("priceDisplay-" + currentBusId);
    if (pd) pd.innerHTML = "₹" + newPrice + '<span class="disc-pill">' + discPct + "% off</span>";
  } else {
    appliedDisc    = 0;
    rb.className   = "";
    rb.textContent = "Better luck next time! Spin again.";
  }
}

function updateSpinUI() {
  document.getElementById("smFree").textContent = freeSpins;
  document.getElementById("smPaid").textContent = paidSpins;
  const btn = document.getElementById("btnSpin");
  if (freeSpins > 0) {
    btn.disabled = false;
    btn.textContent = "Spin Free! (" + freeSpins + " left)";
    document.getElementById("paySpinArea").style.display = "none";
  } else {
    btn.disabled = true;
    btn.textContent = "No free spins left";
    document.getElementById("paySpinArea").style.display = "block";
  }
}

async function payAndSpin() {
  const activeChip = document.querySelector(".pay-chip.active");
  const method = activeChip ? activeChip.textContent : "UPI";
  const confirmed = confirm("Pay ₹50 via " + method + "? (Click OK to confirm)");
  if (!confirmed) return;
  paidSpins++;
  freeSpins = 1;
  document.getElementById("paySpinArea").style.display = "none";
  updateSpinUI();
  doSpin();
}

function openChat(busId, busNameEncoded) {
  const token = localStorage.getItem("token");
  const bookingId = localStorage.getItem("bookingId_" + busId);
  if (!token) {
    alert("Please login first!");
    window.location.href = "login.html";
    return;
  }
  if (!bookingId) {
    alert("Chat is only available for confirmed ticket holders.\nPlease book a ticket first.");
    return;
  }
  window.location.href = "chat.html?busId=" + busId + "&busName=" + busNameEncoded + "&bookingId=" + bookingId;
}

// pay chip toggle
document.querySelectorAll(".pay-chip").forEach(c => {
  c.addEventListener("click", () => {
    document.querySelectorAll(".pay-chip").forEach(x => x.classList.remove("active"));
    c.classList.add("active");
  });
});

loadBuses();
</script>
</body>
</html>
