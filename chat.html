<!DOCTYPE html>
<html>
<head>
<title>TravelEase - Bus Chat</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",sans-serif;background:#0b1220;color:white;height:100vh;display:flex;flex-direction:column;}

.chat-header{
  background:#111827;padding:14px 20px;
  display:flex;align-items:center;gap:14px;
  border-bottom:1px solid #1f2937;
  position:sticky;top:0;z-index:10;
}
.back-btn{background:#1f2937;border:none;color:#38bdf8;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
.back-btn:hover{background:#374151;}
.chat-title h2{font-size:17px;font-weight:600;margin-bottom:2px;}
.chat-title p{font-size:12px;color:#9ca3af;}
.booking-badge{margin-left:auto;background:#052e16;color:#4ade80;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;}

#messagesArea{
  flex:1;overflow-y:auto;
  padding:20px 16px;
  display:flex;flex-direction:column;gap:10px;
}

.msg{max-width:70%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word;}
.msg.mine{align-self:flex-end;background:#6366f1;color:#fff;border-bottom-right-radius:4px;}
.msg.theirs{align-self:flex-start;background:#1f2937;color:#e5e7eb;border-bottom-left-radius:4px;}
.msg .sender{font-size:11px;font-weight:600;margin-bottom:3px;opacity:0.8;}
.msg .meta{font-size:10px;margin-top:4px;opacity:0.6;text-align:right;}
.msg.theirs .meta{text-align:left;}

.system-msg{text-align:center;font-size:12px;color:#6b7280;padding:4px 0;}

.input-bar{
  background:#111827;border-top:1px solid #1f2937;
  padding:12px 16px;display:flex;gap:10px;align-items:flex-end;
}
#msgInput{
  flex:1;background:#1f2937;border:none;border-radius:12px;
  padding:10px 14px;color:white;font-size:14px;
  resize:none;outline:none;min-height:42px;max-height:120px;
  font-family:"Segoe UI",sans-serif;line-height:1.4;
}
#msgInput::placeholder{color:#6b7280;}
#sendBtn{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  border:none;border-radius:12px;padding:10px 18px;
  color:#fff;font-size:15px;cursor:pointer;font-weight:700;
  flex-shrink:0;height:42px;
}
#sendBtn:hover{opacity:0.9;}
#sendBtn:disabled{opacity:0.4;cursor:not-allowed;}

#mainContent{flex:1;display:flex;flex-direction:column;overflow:hidden;}

.center-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;color:#9ca3af;text-align:center;padding:20px;
}
.center-screen .icon{font-size:44px;}
.center-screen h3{color:#fff;font-size:18px;}
.center-screen p{font-size:13px;max-width:260px;line-height:1.6;}
.center-screen button{
  margin-top:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;border:none;border-radius:10px;
  padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;
}
</style>
</head>
<body>

<div class="chat-header">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="chat-title">
    <h2 id="headerTitle">Bus Chat</h2>
    <p id="headerSub">Verifying...</p>
  </div>
  <div class="booking-badge" id="bookingBadge" style="display:none;">✓ Confirmed</div>
  <button onclick="logout()" style="background:#dc2626;border:none;color:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;margin-left:8px;">Logout</button>
</div>

<div id="mainContent">
  <div class="center-screen">
    <div class="icon">⏳</div>
    <h3>Verifying your ticket...</h3>
  </div>
</div>

<script>
const params    = new URLSearchParams(window.location.search);
const busId     = params.get("busId");
const busName   = decodeURIComponent(params.get("busName") || "Bus");
const bookingId = params.get("bookingId") || localStorage.getItem("bookingId_" + busId);
const token     = localStorage.getItem("token");

document.getElementById("headerTitle").textContent = busName;

let myName = "";
let socket = null;

// ── STEP 1: Verify via backend ──
async function init() {
  if (!token || !bookingId) {
    showDenied(!token);
    return;
  }

  try {
    const res = await fetch("/verify-booking", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": token
      },
      body: JSON.stringify({ bookingId, busId })
    });

    const data = await res.json();

    if (!res.ok || !data.valid) {
      showDenied(false);
      return;
    }

    // Verified — connect socket and show chat
    document.getElementById("headerSub").textContent = "Booking: " + bookingId;
    document.getElementById("bookingBadge").style.display = "block";
    connectSocket();

  } catch (err) {
    document.getElementById("mainContent").innerHTML = `
      <div class="center-screen">
        <div class="icon">⚠️</div>
        <h3>Connection Error</h3>
        <p>Could not verify your ticket. Please check your connection.</p>
        <button onclick="location.reload()">Retry</button>
      </div>`;
  }
}

async function logout() {
  const token = localStorage.getItem("token");
  if (token) {
    await fetch("/logout", {
      method: "POST",
      headers: { "Authorization": token }
    }).catch(() => {});
  }
  localStorage.clear();
  window.location.href = "login.html";
}

function showDenied(noToken) {
  document.getElementById("mainContent").innerHTML = `
    <div class="center-screen">
      <div class="icon">🔒</div>
      <h3>Access Denied</h3>
      <p>${noToken
        ? "Please login first to access the chat."
        : "Chat is only available for confirmed ticket holders. Please book a ticket first."
      }</p>
      <button onclick="window.location.href='${noToken ? "login.html" : "buses.html"}'">
        ${noToken ? "Login" : "Book a Ticket"}
      </button>
    </div>`;
}

// ── STEP 2: Connect Socket.io ──
function connectSocket() {
  socket = io({ auth: { token } });

  socket.on("connect", () => {
    // Join chat room — server will re-verify booking
    socket.emit("joinChat", { busId, bookingId });
  });

  socket.on("accessDenied", ({ reason }) => {
    showDenied(false);
  });

  socket.on("myName", (name) => {
    myName = name;
    showChat(); // render UI only after name confirmed
  });

  socket.on("chatHistory", (history) => {
    history.forEach(m => appendMessage(m.name, m.msg, m.time, m.name === myName));
  });

  socket.on("newMessage", ({ name, msg, time }) => {
    appendMessage(name, msg, time, name === myName);
  });

  socket.on("userJoined", ({ name }) => {
    appendSystem(name + " joined the chat");
  });

  socket.on("userLeft", ({ name }) => {
    appendSystem(name + " left the chat");
  });

  socket.on("connect_error", (err) => {
    showDenied(!token);
  });
}

// ── STEP 3: Show chat UI ──
function showChat() {
  document.getElementById("mainContent").innerHTML = `
    <div id="messagesArea"></div>
    <div class="input-bar">
      <textarea id="msgInput" placeholder="Type a message..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>`;

  document.getElementById("msgInput").addEventListener("input", function() {
    this.style.height = "42px";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
  });

  document.getElementById("msgInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
}

function sendMessage() {
  const input = document.getElementById("msgInput");
  const text  = input.value.trim();
  if (!text || !socket) return;
  socket.emit("sendMessage", { busId, msg: text });
  input.value = "";
  input.style.height = "42px";
}

function appendMessage(name, msg, time, isMine) {
  const area = document.getElementById("messagesArea");
  if (!area) return;

  const div = document.createElement("div");
  div.className = "msg " + (isMine ? "mine" : "theirs");
  div.innerHTML = `
    ${!isMine ? `<div class="sender">${escHtml(name)}</div>` : ""}
    ${escHtml(msg)}
    <div class="meta">${time}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function appendSystem(text) {
  const area = document.getElementById("messagesArea");
  if (!area) return;
  const div = document.createElement("div");
  div.className = "system-msg";
  div.textContent = text;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;")
    .replace(/\n/g,"<br>");
}

init();
</script>
</body>
</html>
